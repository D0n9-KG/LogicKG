services:
  neo4j:
    image: neo4j:5
    container_name: logickg-neo4j
    restart: unless-stopped
    ports:
      # 安全默认：仅绑定到本机回环地址，避免把 Neo4j 直接暴露到公网（需要远程访问可自行改回 0.0.0.0）。
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      # docker compose 会自动读取根目录 `.env`；建议自行修改 NEO4J_PASSWORD
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}
      - NEO4J_server_memory_pagecache_size=1G
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
volumes:
  neo4j_data:
  neo4j_logs:
